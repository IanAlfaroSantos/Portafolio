<!DOCTYPE html>
<html lang="es" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portafolio | Ian Alfaro Desarrollador Web">
  <meta name="robots" content="index,follow">

  <script>
    // Guardar el origen local para redirecciones offline posteriores
    if (window.location.hostname === 'localhost' || window.location.protocol === 'file:' || window.location.protocol === 'capacitor:') {
      localStorage.setItem('localOrigin', window.location.origin);
    }

    // Redirigir al portafolio en vivo de Vercel solo si estamos en la app con internet (no en desarrollo local y no sin conexión)
    if (
      navigator.onLine && (
        ((window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') && 
         window.location.port !== '5173' && 
         window.location.port !== '4173') ||
        window.location.protocol === 'file:' || 
        window.location.protocol === 'capacitor:'
      )
    ) {
      window.location.replace("https://portafolio-five-alpha-21.vercel.app/");
    }
  </script>
  <title>Ian Alfaro | Desarrollador Web</title>

  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cooper+Hewitt&family=PT+Sans&display=swap" rel="stylesheet">

  <link rel="icon" href="/assets/images/LogoPersonal.png" type="image/png" />
  <link rel="apple-touch-icon" href="/assets/images/LogoPersonal.png" />

  <meta property="og:title" content="Ian Alfaro | Desarrollador Web" />
  <meta property="og:description" content="Portafolio | Ian Alfaro Desarrollador Web" />
  <meta property="og:image" content="/assets/images/LogoPersonal.png" />
  <meta property="og:type" content="website" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary': '#00f0ff',      // Cian Neón
            'secondary': '#8b7cf6',    // Violeta/Púrpura
            'accent': '#ff007a',       // Rosa/Magenta
            'dark-bg': '#020306',      // Fondo Negro Profundo
            'card-bg': '#070a13',      // Tarjeta Oscura Densidad
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Space Grotesk', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          animation: {
            'gradient-x': 'gradient-x 15s ease infinite',
            'float': 'float 6s ease-in-out infinite',
            'fade-in': 'fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'spin-slow': 'spin 20s linear infinite',
            'shimmer': 'shimmer 2.5s infinite linear',
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'scan': 'scan 4s cubic-bezier(0.4, 0, 0.2, 1) infinite',
            'glitch-1': 'glitch1 1s linear infinite',
            'glitch-2': 'glitch2 1.2s linear infinite',
            'glitch-once': 'glitchOnce 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) both',
            'section-glitch': 'sectionGlitch 1.1s cubic-bezier(0.25, 0.46, 0.45, 0.94) both',
          },
          keyframes: {
            'gradient-x': {
              '0%, 100%': { 'background-size': '200% 200%', 'background-position': 'left center' },
              '50%': { 'background-size': '200% 200%', 'background-position': 'right center' },
            },
            'float': {
              '0%, 100%': { transform: 'translateY(0px) rotate(0deg)' },
              '50%': { transform: 'translateY(-10px) rotate(1deg)' },
            },
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            scan: {
              '0%': { top: '0%', opacity: '0' },
              '10%, 90%': { opacity: '0.8' },
              '100%': { top: '100%', opacity: '0' },
            },
            glitch1: {
              '0%': { 'clip-path': 'inset(20% 0 30% 0)', transform: 'translate(-2px, 2px)' },
              '20%': { 'clip-path': 'inset(60% 0 10% 0)', transform: 'translate(2px, -2px)' },
              '40%': { 'clip-path': 'inset(10% 0 80% 0)', transform: 'translate(-1px, 1px)' },
              '60%': { 'clip-path': 'inset(80% 0 5% 0)', transform: 'translate(1px, -1px)' },
              '80%': { 'clip-path': 'inset(40% 0 45% 0)', transform: 'translate(-2px, -2px)' },
              '100%': { 'clip-path': 'inset(0% 0 0% 0)', transform: 'translate(0, 0)' },
            },
            glitch2: {
              '0%': { 'clip-path': 'inset(10% 0 80% 0)', transform: 'translate(2px, -2px)' },
              '20%': { 'clip-path': 'inset(30% 0 20% 0)', transform: 'translate(-2px, 2px)' },
              '40%': { 'clip-path': 'inset(50% 0 40% 0)', transform: 'translate(1px, -1px)' },
              '60%': { 'clip-path': 'inset(15% 0 70% 0)', transform: 'translate(-1px, 1px)' },
              '80%': { 'clip-path': 'inset(70% 0 10% 0)', transform: 'translate(2px, 2px)' },
              '100%': { 'clip-path': 'inset(0% 0 0% 0)', transform: 'translate(0, 0)' },
            },
            glitchOnce: {
              '0%': { 'clip-path': 'inset(40% 0 61% 0)', transform: 'skew(0.3deg)', opacity: '0.8' },
              '15%': { 'clip-path': 'inset(92% 0 1% 0)', transform: 'skew(-0.5deg)' },
              '30%': { 'clip-path': 'inset(15% 0 80% 0)', transform: 'skew(0.5deg)' },
              '45%': { 'clip-path': 'inset(80% 0 5% 0)', transform: 'skew(-0.3deg)' },
              '60%': { 'clip-path': 'inset(5% 0 92% 0)', transform: 'skew(0.8deg)' },
              '75%': { 'clip-path': 'inset(0 0 0 0)', transform: 'skew(0deg)', opacity: '1' },
              '100%': { 'clip-path': 'inset(0 0 0 0)', transform: 'skew(0deg)', opacity: '1' },
            },
            sectionGlitch: {
              '0%':   { 'clip-path': 'inset(0 0 0 0)', transform: 'skewX(0deg) translateX(0px)', filter: 'hue-rotate(0deg) brightness(1)' },
              '8%':   { 'clip-path': 'inset(0 0 97% 0)', transform: 'skewX(0.25deg) translateX(-1px)', filter: 'hue-rotate(10deg) brightness(1.05) saturate(1.1)' },
              '18%':  { 'clip-path': 'inset(96% 0 0 0)', transform: 'skewX(-0.2deg) translateX(1px)', filter: 'hue-rotate(-8deg) brightness(1.05)' },
              '28%':  { 'clip-path': 'inset(0 0 94% 0)', transform: 'skewX(0.1deg) translateX(-0.5px)', filter: 'hue-rotate(5deg)' },
              '40%':  { 'clip-path': 'inset(0 0 0 0)', transform: 'skewX(0deg) translateX(0px)', filter: 'hue-rotate(0deg) brightness(1)' },
              '100%': { 'clip-path': 'inset(0 0 0 0)', transform: 'skewX(0deg) translateX(0px)', filter: 'hue-rotate(0deg) brightness(1)' },
            }
          }
        }
      }
    }
  </script>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <style type="text/tailwindcss">
    @layer base {
      body {
        @apply bg-dark-bg text-gray-300 antialiased overflow-x-hidden text-sm leading-relaxed;
        font-family: 'Inter', sans-serif;
      }
      h1, h2, h3, h4 { @apply font-display font-extrabold tracking-tight text-white; }
      span, button, a { font-family: 'Inter', sans-serif; }
    }

    body::before {
      content: '' !important;
      display: block !important;
      position: fixed;
      inset: 0;
      z-index: -3;
      pointer-events: none;
      background-image: 
        radial-gradient(circle at 1px 1px, rgba(0, 240, 255, 0.04) 1px, transparent 0),
        linear-gradient(rgba(0, 240, 255, 0.005) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 240, 255, 0.005) 1px, transparent 1px) !important;
      opacity: .45 !important;
      background-size: 32px 32px !important;
      animation: gridFloat 35s linear infinite;
    }

    body::after {
      content: '' !important;
      display: block !important;
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background: radial-gradient(circle at 50% 120%, rgba(139, 92, 246, 0.08), transparent 50%);
    }

    @keyframes gridFloat {
      0% { transform: translateY(0); }
      100% { transform: translateY(32px); }
    }

    .ambient-glow {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: -1;
      filter: blur(120px);
      opacity: 0.1;
      mix-blend-mode: screen;
    }
    .ambient-glow-1 {
      top: -10%;
      left: -10%;
      width: 40vw;
      height: 40vw;
      background: radial-gradient(circle, #00f0ff, transparent 70%);
      animation: floatGlow1 22s ease-in-out infinite alternate;
    }
    .ambient-glow-2 {
      bottom: -15%;
      right: -10%;
      width: 45vw;
      height: 45vw;
      background: radial-gradient(circle, #ff007a, transparent 70%);
      animation: floatGlow2 26s ease-in-out infinite alternate;
    }
    .ambient-glow-3 {
      top: 35%;
      right: 10%;
      width: 30vw;
      height: 30vw;
      background: radial-gradient(circle, #8b7cf6, transparent 70%);
      animation: floatGlow3 20s ease-in-out infinite alternate;
    }

    @keyframes floatGlow1 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(4vw, 4vh) scale(1.1); }
    }
    @keyframes floatGlow2 {
      0% { transform: translate(0, 0) scale(1.05); }
      100% { transform: translate(-5vw, -3vh) scale(0.95); }
    }
    @keyframes floatGlow3 {
      0% { transform: translate(0, 0) scale(0.95); }
      100% { transform: translate(3vw, -3vh) scale(1.05); }
    }

    @layer components {
      .glass-card {
        @apply bg-card-bg/50 border border-white/[0.04] rounded-2xl backdrop-blur-2xl transition-all duration-500 ease-[cubic-bezier(0.16,1,0.3,1)] relative overflow-hidden;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03), 0 10px 30px rgba(0, 0, 0, 0.5);
      }
      .glass-card::before {
        content: '';
        @apply absolute inset-0 pointer-events-none opacity-0 transition-opacity duration-500 ease-[cubic-bezier(0.16,1,0.3,1)];
        background: radial-gradient(circle at center, rgba(0, 240, 255, 0.03) 0%, transparent 60%);
      }
      .glass-card:hover::before {
        @apply opacity-100;
      }
      .glass-card:hover {
        @apply border-primary/30 -translate-y-1;
        box-shadow: 0 0 25px rgba(0, 240, 255, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 15px 35px rgba(0, 0, 0, 0.6);
      }
      
      .glass-panel {
        @apply bg-card-bg/30 border border-white/[0.03] rounded-xl backdrop-blur-xl transition-all duration-500 ease-[cubic-bezier(0.16,1,0.3,1)];
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02), 0 8px 20px rgba(0, 0, 0, 0.4);
      }
      .glass-panel:hover {
        @apply border-secondary/25;
        box-shadow: 0 0 15px rgba(139, 92, 246, 0.06), inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }

      .vivid-gradient {
        @apply bg-gradient-to-r from-primary via-secondary to-accent bg-clip-text text-transparent animate-gradient-x;
      }
      .text-gradient {
        @apply bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent;
      }
      .text-gradient-vivid {
        @apply bg-gradient-to-r from-primary via-secondary to-accent bg-clip-text text-transparent;
      }
      .bg-gradient-primary {
        @apply bg-gradient-to-r from-primary via-secondary to-accent;
      }
      
      .btn-luxury {
        @apply relative overflow-hidden px-5 py-3 rounded-xl font-mono font-bold uppercase tracking-widest text-[9px] transition-all duration-300 hover:scale-[1.03] active:scale-95 flex items-center justify-center gap-2 border;
      }
      .btn-primary-luxury {
        @apply bg-gradient-to-r from-primary/10 to-secondary/15 text-white border-primary/20 hover:border-primary/40 hover:bg-primary/20;
        box-shadow: 0 0 15px rgba(0, 240, 255, 0.1), inset 0 0 5px rgba(0, 240, 255, 0.1);
      }
      .btn-primary-luxury:hover {
        box-shadow: 0 0 25px rgba(0, 240, 255, 0.25), inset 0 0 8px rgba(0, 240, 255, 0.2);
      }
      .btn-secondary-luxury {
        @apply bg-transparent text-white border-white/5 hover:border-secondary/35 hover:bg-white/[0.02];
      }
      .btn-secondary-luxury:hover {
        box-shadow: 0 0 15px rgba(139, 92, 246, 0.1);
      }
    }

    .shadow-3xl {
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    }

    .typing-effect::after {
      content: '';
      @apply inline-block w-[2px] h-[1em] bg-primary ml-1 animate-pulse align-middle;
    }

    .hud-scanline {
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0),
        rgba(255,255,255,0) 50%,
        rgba(0, 240, 255, 0.05) 50%,
        rgba(0, 240, 255, 0.05)
      );
      background-size: 100% 4px;
    }

    .hud-glow {
      box-shadow: 0 0 10px rgba(0, 240, 255, 0.1), inset 0 0 5px rgba(0, 240, 255, 0.05);
    }

    .interactive-cursor-glow {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background: radial-gradient(
        600px circle at var(--mouse-x, 0px) var(--mouse-y, 0px),
        rgba(0, 240, 255, 0.045),
        rgba(139, 92, 246, 0.03),
        transparent 65%
      );
    }

    .hacker-glitch-overlay {
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.25),
        rgba(0, 0, 0, 0.25) 1px,
        transparent 1px,
        transparent 3px
      );
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #010204; }
    ::-webkit-scrollbar-thumb { background: #0c1120; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #00f0ff; }

    @media (max-width: 767px) {
      [data-aos] {
        opacity: 1 !important;
        transform: none !important;
        transition: none !important;
      }
    }
  </style>
</head>

<body>
  <div class="ambient-glow ambient-glow-1"></div>
  <div class="ambient-glow ambient-glow-2"></div>
  <div class="ambient-glow ambient-glow-3"></div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
